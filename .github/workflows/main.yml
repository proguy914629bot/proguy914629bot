name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: proguy914629bot
          template: classic
          base: header, activity, community, repositories, metadata

          plugin_achievements: yes
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          plugin_activity: yes
          plugin_activity_days: 30
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all

          plugin_contributors: yes
          plugin_contributors_head: master
          plugin_contributors_ignored: github-actions[bot], dependabot[bot], dependabot-preview[bot]
          plugin_contributors_sections: contributors

          plugin_gists: yes

          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_from: 200

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          plugin_lines: yes
          plugin_notable: yes

          # Fix: removed plugin_posts entirely (invalid .user.login source caused "Unsupported source" error)
          # To re-enable, set a valid source like: plugin_posts_source: dev.to
          # and add: plugin_posts_user: your-dev.to-username

          # Fix: disabled plugin_projects (requires elevated token scope "project")
          # To re-enable, regenerate METRICS_TOKEN with the "project" OAuth scope checked
          # plugin_projects: yes
          # plugin_projects_limit: 4

          plugin_repositories: yes
          plugin_repositories_affiliations: owner
          plugin_repositories_batch: 100

          plugin_stargazers: yes
          plugin_traffic: yes
